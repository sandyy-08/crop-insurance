spring.application.name=crop-insurance
server.port=8080

# ?? MySQL ??????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/crop_insurance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? File uploads ???????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ?? AI image server ????????????????????????????????????????????????????????
ai.image.server.url=http://127.0.0.1:5000/predict

# ?? IP Webcam (Play Store app) ?????????????????????????????????????????????
# Step 1: Install "IP Webcam" by Pavel Khlebovich from Play Store
# Step 2: Open app ? scroll down ? tap "Start server"
# Step 3: Note the URL shown on screen (e.g. http://192.168.1.12:8080)
# Step 4: Replace the IP below with YOUR phone's IP
# Step 5: Test in browser: http://192.168.1.12:8080/shot.jpg ? should show live photo
# IMPORTANT: Phone and PC must be on the SAME WiFi network
ipwebcam.url=http://192.0.0.4:8080

# ?? Upload directory for auto-captured field photos ????????????????????????
# Photos are saved here: uploads/claim-images/farmer1_FLOOD_20251201_143022.jpg
upload.dir=uploads/claim-images

# Serve saved photos as static files (accessible via browser)
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ?? Optional: reduce noisy logs ????????????????????????????????????????????
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE